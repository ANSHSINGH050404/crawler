version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: crawler-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: crawler-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  crawler:
    build: .
    container_name: crawler-app
    depends_on:
      - redis
      - mongo
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://mongo:27017/crawler
    command: npm run start

volumes:
  mongo-data:
